<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SION Media</title>
    <style>
      :root {
        color-scheme: dark;
        background: #050714;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background:
          radial-gradient(circle at top left, rgba(59, 130, 246, 0.15), transparent 24%),
          radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.12), transparent 26%),
          #050714;
        color: #f8fafc;
      }
      .panel {
        width: min(92vw, 520px);
        padding: 32px;
        border-radius: 32px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(15, 23, 42, 0.88);
        backdrop-filter: blur(28px);
        box-shadow: 0 40px 120px rgba(0, 0, 0, 0.35);
      }
      .brand {
        display: grid;
        place-items: center;
        width: 102px;
        height: 102px;
        margin: 0 auto 26px;
        border-radius: 28px;
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.96), rgba(168, 85, 247, 0.94));
        box-shadow:
          0 0 32px rgba(59, 130, 246, 0.18),
          inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        animation: pulse-glow 3s ease-in-out infinite alternate;
      }
      @keyframes pulse-glow {
        from {
          transform: scale(1);
          box-shadow:
            0 0 24px rgba(59, 130, 246, 0.2),
            inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }
        to {
          transform: scale(1.04);
          box-shadow:
            0 0 40px rgba(59, 130, 246, 0.4),
            inset 0 0 0 1px rgba(255, 255, 255, 0.15);
        }
      }
      .brand span {
        font-size: 40px;
        font-weight: 800;
        letter-spacing: -0.08em;
      }
      h1 {
        margin: 0;
        font-size: 2.1rem;
        line-height: 1.1;
        text-align: center;
        letter-spacing: -0.03em;
      }
      p {
        margin: 0;
        text-align: center;
        color: rgba(226, 232, 240, 0.72);
      }
      .progress {
        margin-top: 32px;
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }
      .bar {
        width: 74%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(59, 130, 246, 1), rgba(168, 85, 247, 1));
        animation: glow 1.9s ease-in-out infinite alternate;
      }
      @keyframes glow {
        from {
          transform: scaleX(0.96);
          filter: blur(0);
        }
        to {
          transform: scaleX(1.04);
          filter: blur(1px);
        }
      }
      .status {
        margin-top: 24px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(226, 232, 240, 0.52);
      }
      .badge {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: #cbd5e1;
        font-weight: 700;
      }
    </style>
  </head>

      <h1>SION Media</h1>
      <p>Professional worship presentation engine</p>
      <div class="progress"><div class="bar" id="progressBar" style="width: 0%"></div></div>
      <div class="status">
        <span id="statusText">Initializing projection engine</span>
        <span class="badge" id="gpuBadge">GPU active</span>
      </div>
    </div>
    <script>
      ;(function () {
        const bar = document.getElementById('progressBar')
        const statusText = document.getElementById('statusText')
        const gpuBadge = document.getElementById('gpuBadge')

        const statuses = [
          { time: 0, text: 'Initializing projection engine...', badge: 'GPU ACTIVE' },
          { time: 600, text: 'Warming up graphics pipelines...', badge: 'GPU ACTIVE' },
          { time: 1300, text: 'Resolving stage display layouts...', badge: 'HDMI CONNECTED' },
          { time: 2000, text: 'Readying SION Media console...', badge: 'READY' }
        ]

        let width = 0
        const targetWidth = 92 // stop smoothly around 92% until closed
        const duration = 2500 // 2.5 seconds total simulation
        const start = performance.now()

        function animate(timestamp) {
          const elapsed = timestamp - start
          const progress = Math.min(elapsed / duration, 1)

          // Easing out curve for natural loading feel
          const easeOut = 1 - Math.pow(1 - progress, 3)
          width = easeOut * targetWidth
          bar.style.width = width + '%'

          // Update status messages based on time
          for (let i = statuses.length - 1; i >= 0; i--) {
            if (elapsed >= statuses[i].time) {
              if (statusText.innerText !== statuses[i].text) {
                statusText.innerText = statuses[i].text
              }
              if (gpuBadge.innerText !== statuses[i].badge) {
                gpuBadge.innerText = statuses[i].badge
                if (statuses[i].badge === 'READY') {
                  gpuBadge.style.background = 'rgba(34, 197, 94, 0.2)'
                  gpuBadge.style.color = '#4ade80'
                } else if (statuses[i].badge === 'HDMI CONNECTED') {
                  gpuBadge.style.background = 'rgba(59, 130, 246, 0.2)'
                  gpuBadge.style.color = '#60a5fa'
                }
              }
              break
            }
          }

          if (progress < 1) {
            requestAnimationFrame(animate)
          }
        }

        requestAnimationFrame(animate)
      })()
    </script>
