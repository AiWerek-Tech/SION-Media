appId: com.aiwerek.sion-media
productName: SION Media
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # Exclude transient SQLite journal files — they are runtime artifacts
  # and must never leak into a release build.
  # NOTE: resources/sion.db IS intentionally included — it is the pre-populated
  # default database (525 songs + hymnals) that gets copied to userData on first launch.
  - '!resources/**/*.db-wal'
  - '!resources/**/*.db-shm'
  - '!resources/**/*.sqlite-wal'
  - '!resources/**/*.sqlite-shm'
# Code Signing — Beta: don't fail build if certificate is unavailable.
# Set to true once a trusted CA certificate is purchased.
forceCodeSigning: false
asarUnpack:
  - resources/**
win:
  executableName: sion-media
  icon: build/icon.ico
  target: nsis
  verifyUpdateCodeSignature: false
  requestedExecutionLevel: asInvoker
nsis:
  artifactName: SION-Media-${version}-Setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  installerIcon: build/icon.ico
  installerSidebar: build/installerSidebar.bmp
  uninstallerSidebar: build/uninstallerSidebar.bmp
  installerHeader: build/installerHeader.bmp
  include: build/installer.nsh
  createDesktopShortcut: true
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createStartMenuShortcut: true
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  displayLanguageSelector: false
  installerLanguages:
    - id_ID
  language: '1057'
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: AiWerek Tech
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: true
publish:
  provider: generic
  url: https://aiwerek-tech.github.io/sion-media-web
